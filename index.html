<html lang="ja">

<meta name="mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f5f2ec;
  --paper-dim:#e8e3da;
  --ink:#3a3632;
  --ink-light:#6b645c;
  --rock:#7d8a8e;
  --moss:#6b7c4e;
  --ochre:#b8a472;
  --rust:#9e6b5a;
  --sky:#8fa4b0;
  --serif:'Shippori Mincho',serif;
  --sans:'Noto Sans JP',sans-serif;
  --garamond:'Cormorant Garamond',serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.7;
  min-height:100vh;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  overflow-x:hidden;
  position:relative;
}
/* ---- 霧粒（背景装飾、控えめ） ---- */
.mist{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.mist span{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.55),rgba(255,255,255,0) 70%);
  opacity:.35;
}
.mist span:nth-child(1){width:140px;height:140px;top:12%;left:-40px;}
.mist span:nth-child(2){width:90px;height:90px;top:38%;right:-20px;opacity:.25;}
.mist span:nth-child(3){width:180px;height:180px;top:64%;left:14%;opacity:.2;}
.mist span:nth-child(4){width:110px;height:110px;top:85%;right:8%;opacity:.28;}

.wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:0 16px 40px;}

/* ---- ヘッダー ---- */
header{
  text-align:center;
  padding:34px 0 6px;
  position:relative;
}
header .raicho{
  width:96px;height:auto;display:block;margin:0 auto 4px;
}
header h1{
  font-family:var(--serif);font-weight:600;font-size:30px;
  letter-spacing:.28em;text-indent:.28em;color:var(--ink);
}
header .reading{
  font-family:var(--serif);font-size:11px;letter-spacing:.42em;text-indent:.42em;
  color:var(--ink-light);margin-top:2px;
}
header .subtitle{
  font-size:11.5px;color:var(--rock);margin-top:10px;letter-spacing:.12em;
}

/* ---- ナビ ---- */
nav{
  display:flex;justify-content:center;gap:0;
  margin:22px 0 20px;
  border-top:1px solid rgba(125,138,142,.35);
  border-bottom:1px solid rgba(125,138,142,.35);
}
nav button{
  appearance:none;border:none;background:none;cursor:pointer;
  font-family:var(--serif);font-weight:500;font-size:15px;letter-spacing:.18em;
  color:var(--ink-light);padding:12px 20px;position:relative;
  transition:color .25s;
}
nav button.active{color:var(--ink);}
nav button.active::after{
  content:'';position:absolute;left:18%;right:18%;bottom:-1px;height:2px;
  background:var(--moss);
}
nav button:focus-visible{outline:2px solid var(--moss);outline-offset:-2px;}

/* ---- タブの挿絵 ---- */
.tab-illust{display:flex;justify-content:flex-end;padding:0 6px;margin-bottom:-6px;}
.tab-illust img{width:88px;height:auto;opacity:.95;}

/* ---- セクション見出し ---- */
.cat-title{
  font-family:var(--serif);font-weight:500;font-size:14px;letter-spacing:.2em;
  color:var(--rock);margin:26px 4px 10px;
  display:flex;align-items:center;gap:10px;
}
.cat-title::after{content:'';flex:1;height:1px;background:rgba(125,138,142,.3);}

/* ---- カード（紙の重なり） ---- */
.card{
  background:var(--paper-dim);
  margin-bottom:10px;
  box-shadow:
    0 1px 0 rgba(255,255,255,.7) inset,
    1px 2px 0 rgba(58,54,50,.05),
    2px 5px 10px rgba(58,54,50,.09);
  border-left:2px solid transparent;
  transition:border-color .3s;
}
.card.open{border-left-color:var(--moss);}
.card.flash{animation:flash 1.2s ease;}
@keyframes flash{
  0%{box-shadow:0 0 0 2px var(--ochre),2px 5px 10px rgba(58,54,50,.09);}
  100%{box-shadow:0 1px 0 rgba(255,255,255,.7) inset,1px 2px 0 rgba(58,54,50,.05),2px 5px 10px rgba(58,54,50,.09);}
}
.card-head{
  width:100%;appearance:none;border:none;background:none;cursor:pointer;
  text-align:left;padding:13px 14px;
  display:flex;align-items:center;gap:10px;
  font-family:inherit;color:inherit;
}
.card-head:focus-visible{outline:2px solid var(--moss);outline-offset:-2px;}
.card-name{
  font-family:var(--serif);font-weight:500;font-size:15.5px;flex:1;min-width:0;
}
.card-dose{
  font-size:11.5px;color:var(--ink-light);white-space:nowrap;flex-shrink:0;
}
.card-caret{
  flex-shrink:0;width:9px;height:9px;
  border-right:1.5px solid var(--rock);border-bottom:1.5px solid var(--rock);
  transform:rotate(45deg);transition:transform .3s;margin-top:-3px;
}
.card.open .card-caret{transform:rotate(-135deg);margin-top:3px;}
.card-body{
  max-height:0;overflow:hidden;
  transition:max-height .4s ease;
}
.card-inner{padding:2px 14px 16px;}

/* ---- 品目詳細 ---- */
.detail-label{
  font-size:10.5px;letter-spacing:.18em;color:var(--rock);
  margin:14px 0 6px;
}
.nutrient-link,.source-link{
  display:flex;align-items:baseline;gap:8px;
  width:100%;appearance:none;border:none;background:none;cursor:pointer;
  font-family:var(--sans);font-size:14px;color:var(--ink);
  padding:7px 4px;text-align:left;
  border-bottom:1px dotted rgba(125,138,142,.35);
}
.nutrient-link:last-of-type,.source-link:last-of-type{border-bottom:none;}
.nutrient-link:focus-visible,.source-link:focus-visible{outline:2px solid var(--moss);outline-offset:-2px;}
.link-name{color:var(--moss);flex:1;min-width:0;}
.link-name::after{content:' →';font-size:12px;opacity:.7;}
.link-amount{
  font-family:var(--garamond);font-weight:400;font-size:15px;color:var(--ink-light);
  white-space:nowrap;
}
.link-amount .u{font-size:12px;margin-left:1px;}
.link-note{font-size:10.5px;color:var(--ink-light);white-space:nowrap;}

/* ---- 記録者コメント ---- */
.comment{
  font-family:var(--serif);font-weight:400;font-size:13px;line-height:1.95;
  color:var(--ink-light);
  margin-top:14px;padding:10px 12px;
  border-left:2px solid rgba(184,164,114,.55);
  background:rgba(245,242,236,.6);
}
.comment::before{
  content:'記録者注';display:block;
  font-size:10px;letter-spacing:.22em;color:var(--ochre);margin-bottom:4px;
  font-family:var(--sans);
}

/* ---- 栄養素カード ---- */
.n-head{flex-wrap:wrap;row-gap:4px;}
.n-name{
  font-family:var(--serif);font-weight:500;font-size:15.5px;
  flex:0 1 auto;min-width:0;
}
.n-status{
  font-size:11px;letter-spacing:.06em;white-space:nowrap;flex-shrink:0;
  padding:1px 7px;border:1px solid currentColor;
}
.s-sufficient{color:var(--moss);}
.s-adequate{color:var(--sky);}
.s-caution{color:var(--ochre);}
.s-insufficient{color:var(--rust);}
.s-supplemented{color:var(--rock);}
.n-spacer{flex:1;}
.n-figures{
  font-family:var(--garamond);font-size:15px;color:var(--ink-light);white-space:nowrap;
}
.n-figures b{font-weight:400;color:var(--ink);font-size:17px;}
.n-figures .u{font-size:12px;}

/* ---- 充足バー ---- */
.bar-row{padding:0 14px 12px;display:flex;align-items:center;gap:10px;}
.bar-track{
  flex:1;height:7px;background:rgba(125,138,142,.18);position:relative;
}
.bar-track::after{ /* 推奨量の位置（50%＝100%充足） */
  content:'';position:absolute;left:50%;top:-3px;bottom:-3px;width:1px;
  background:rgba(58,54,50,.4);
}
.bar-fill{
  position:absolute;left:0;top:0;bottom:0;width:0;
  transition:width 1.1s cubic-bezier(.25,.7,.3,1);
}
.bar-fill.f-sufficient{background:var(--moss);}
.bar-fill.f-adequate{background:var(--sky);}
.bar-fill.f-caution{background:var(--ochre);}
.bar-fill.f-insufficient{background:var(--rust);}
.bar-rda-label{
  font-family:var(--garamond);font-size:11px;color:var(--ink-light);white-space:nowrap;
}
.bar-supplemented{
  flex:1;font-size:11px;color:var(--rock);letter-spacing:.1em;
  border-bottom:1px dashed rgba(125,138,142,.4);padding-bottom:2px;
}

/* ---- 栄養素詳細の項目 ---- */
.n-purpose{font-size:13.5px;line-height:1.8;}
.n-notes{
  font-size:12.5px;line-height:1.8;color:var(--ink-light);
  margin-top:10px;padding:8px 10px;
  border-left:2px solid rgba(158,107,90,.5);
}
.n-notes::before{
  content:'注意';display:block;font-size:10px;letter-spacing:.22em;
  color:var(--rust);margin-bottom:2px;
}

/* ---- 凡例 ---- */
.legend{
  display:flex;flex-wrap:wrap;gap:8px 14px;
  padding:10px 4px 4px;margin-bottom:14px;
  font-size:10.5px;color:var(--ink-light);
  position:relative;
}
.legend span{white-space:nowrap;}
.legend i{font-style:normal;font-weight:500;}
.chinguruma-row{display:flex;justify-content:flex-end;padding:4px 8px 0;}
.chinguruma-row img{width:54px;height:auto;opacity:.9;}

/* ---- 髪の回復セクション ---- */
.hair{
  margin-top:44px;padding:20px 16px 22px;
  background:var(--paper-dim);
  box-shadow:1px 2px 0 rgba(58,54,50,.05),2px 5px 10px rgba(58,54,50,.09);
  position:relative;overflow:visible;
}
.hair .okojo{
  position:absolute;left:6px;top:-46px;width:92px;height:auto;
}
.hair h2{
  font-family:var(--serif);font-weight:500;font-size:16px;letter-spacing:.14em;
  margin-bottom:4px;
}
.hair p{font-size:12.5px;color:var(--ink-light);margin-bottom:12px;}
.hair-chips{display:flex;flex-wrap:wrap;gap:8px;}
.hair-chips button{
  appearance:none;cursor:pointer;font-family:var(--sans);font-size:13px;
  color:var(--moss);background:var(--paper);
  border:1px solid rgba(107,124,78,.4);
  padding:6px 13px;
  box-shadow:1px 1px 0 rgba(58,54,50,.06);
}
.hair-chips button:focus-visible{outline:2px solid var(--moss);outline-offset:1px;}

/* ---- 覚書ページ ---- */
.about{display:none;}
.about.visible{display:block;}
.about .landscape{
  width:100%;height:auto;display:block;align:center;
  box-shadow:2px 5px 12px rgba(58,54,50,.12);
}
.about-body{
  margin-top:42px;
  font-family:var(--serif);font-weight:400;font-size:14.5px;
  line-height:2.0;color:var(--ink-light);
}
.about-body h2{
  font-family:var(--serif);font-weight:500;font-size:17px;letter-spacing:.2em;
  color:var(--ink);margin-bottom:26px;text-align:center;
}
.about-body h2::before{content:'── ';color:var(--rock);}
.about-body p{margin-bottom:1.6em;}
.about-sign{
  text-align:right;font-family:var(--serif);font-size:14px;color:var(--ink);
  margin-top:38px;letter-spacing:.1em;
}
.about .watage{
  display:block;width:120px;height:auto;margin:46px auto 0;opacity:.8;
}

/* ---- フッター ---- */
footer{
  position:relative;margin-top:60px;text-align:center;
  padding:10px 16px calc(26px + env(safe-area-inset-bottom));
}
.ridge{display:block;width:100%;height:46px;opacity:.5;}
footer .haimatsu{
  width:150px;height:auto;display:block;margin:-20px auto 12px;
}
footer .meta{
  font-size:10.5px;color:var(--rock);letter-spacing:.1em;line-height:1.9;
}
footer .about-link{
  appearance:none;border:none;background:none;cursor:pointer;
  font-family:var(--serif);font-size:12.5px;color:var(--moss);
  letter-spacing:.18em;margin-bottom:14px;
  border-bottom:1px solid rgba(107,124,78,.4);padding-bottom:2px;
}

.view{display:none;}
.view.visible{display:block;}
.hidden{display:none !important;}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{transition:none !important;animation:none !important;}
}
@media (min-width:480px){
  header .raicho{width:110px;}
}
</style>
</head>

<main>

</main>

<footer>

  <img class="haimatsu" src="haimatsu.png" alt="" aria-hidden="true">
  <div><button class="about-link" id="about-toggle" onclick="toggleAbout()">記録者の覚書</button></div>
  <div class="meta">
    データ版 1.0 ／ 2026年6月<br>
    出典：サプリメント・栄養素一覧
  </div>
</footer>

</div>

    "body": "この野帳は、ある旅の途中で編まれたものである。\n\n旅人は、自らの身体が消耗していることに気づいた。髪が痩せ、肩が軋み、脚が重い。長い間、身体が発する信号を聞き流していた。あるいは、聞こえていても、手当ての仕方を知らなかった。\n\nそこで、一つずつ調べ始めた。何を摂り、何が足り、何が足りないのか。どの石の下にどの草が生え、どの草がどの不調に効くのか。高山の植物が厳しい環境で生き延びるために、限られた水と光を無駄なく使うように──この身体もまた、入ってくるものを正しく配れば、自ずと立て直していくはずであると。\n\n記録は、二つの方向から引けるようにした。品目から栄養素を、栄養素から品目を。旅の途中でふと「これは何のために飲んでいるのだったか」と思った時に、立ち止まらずに済むように。\n\nイワベンケイは岩の割れ目に水を溜める。チングルマは綿毛が飛べる形になるまで待つ。ライチョウは季節ごとに羽を換える。どれも、生き延びるための知恵を、地味な反復の中に持っている。\n\nこの野帳も、そういうものでありたい。派手な処方箋ではなく、毎日の小さな確認のための道具。",
    "signature": "稜線にて　記す"
  }
}
;
</script>
<script>
const D = window.YOJO_DATA;

const productById = {}, nutrientById = {};
D.products.forEach(p => productById[p.id] = p);
D.nutrients.forEach(n => nutrientById[n.id] = n);

function esc(s){return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmt(v){return Number.isInteger(v)? String(v) : String(v);}

/* ---------- 品目タブ ---------- */
function renderProducts(){
  const cats = Object.entries(D.categories).sort((a,b)=>a[1].order-b[1].order);
  let html = '';
  for(const [catId,cat] of cats){
    html += `<div class="cat-title">${esc(cat.label)}</div>`;
    for(const p of D.products.filter(x=>x.category===catId)){
      html += `
      <article class="card" id="p-${p.id}">
        <button class="card-head" onclick="toggleCard('p-${p.id}')" aria-expanded="false">
          <span class="card-name">${esc(p.name)}</span>
          <span class="card-dose">${esc(p.dailyDose)}</span>
          <span class="card-caret" aria-hidden="true"></span>
        </button>
        <div class="card-body">
          <div class="card-inner">
            <div class="detail-label">含有栄養素</div>
            ${p.nutrients.map(n=>{
              const nu = nutrientById[n.nutrientId];
              const note = n.note? `<span class="link-note">${esc(n.note)}</span>` : '';
              return `<button class="nutrient-link" onclick="goNutrient('${n.nutrientId}')">
                <span class="link-name">${esc(nu? nu.name : n.nutrientId)}</span>
                ${note}
                <span class="link-amount">${fmt(n.amount)}<span class="u">${esc(n.unit)}</span></span>
              </button>`;
            }).join('')}
            <div class="comment">${esc(p.comment)}</div>
          </div>
        </div>
      </article>`;
    }
  }
  document.getElementById('products-list').innerHTML = html;
}

/* ---------- 栄養素タブ ---------- */
function statusOrder(s){return {insufficient:0,caution:1,adequate:2,sufficient:3,supplemented:4}[s] ?? 5;}

function renderNutrients(){
  let html = '';
  for(const n of D.nutrients){
    const st = n.status;
    const label = D.statusLabels[st]?.label || st;
    let figures, bar;
    if(n.rda === null){
      figures = `<b>${fmt(n.currentIntake)}</b><span class="u">${esc(n.unit)}</span>`;
      bar = `<div class="bar-row"><div class="bar-supplemented">推奨量の設定なし ── サプリで補充中</div></div>`;
    }else{
      const pct = Math.min(n.currentIntake / n.rda * 100, 200);
      figures = `<b>${fmt(n.currentIntake)}</b><span class="u">${esc(n.unit)}</span>&thinsp;/&thinsp;${fmt(n.rda)}<span class="u">${esc(n.unit)}</span>`;
      bar = `<div class="bar-row">
        <div class="bar-track"><div class="bar-fill f-${st}" data-pct="${pct/2}"></div></div>
        <span class="bar-rda-label">${Math.round(n.currentIntake/n.rda*100)}%</span>
      </div>`;
    }
    html += `
    <article class="card" id="n-${n.id}">
      <button class="card-head n-head" onclick="toggleCard('n-${n.id}')" aria-expanded="false">
        <span class="n-name">${esc(n.name)}</span>
        <span class="n-status s-${st}">${esc(label)}</span>
        <span class="n-spacer"></span>
        <span class="n-figures">${figures}</span>
        <span class="card-caret" aria-hidden="true"></span>
      </button>
      ${bar}
      <div class="card-body">
        <div class="card-inner">
          <div class="detail-label">役割</div>
          <div class="n-purpose">${esc(n.purpose)}</div>
          ${n.notes? `<div class="n-notes">${esc(n.notes)}</div>` : ''}
          <div class="detail-label">供給元</div>
          ${n.sources.map(s=>{
            const pr = productById[s.productId];
            return `<button class="source-link" onclick="goProduct('${s.productId}')">
              <span class="link-name">${esc(pr? pr.name : s.productId)}</span>
              <span class="link-amount">${fmt(s.amount)}<span class="u">${esc(n.unit)}</span></span>
            </button>`;
          }).join('')}
          <div class="comment">${esc(n.comment)}</div>
        </div>
      </div>
    </article>`;
  }
  document.getElementById('nutrients-list').innerHTML = html;
}

function renderLegend(){
  const lg = document.getElementById('legend');
  let html = '';
  for(const [key,v] of Object.entries(D.statusLabels)){
    html += `<span class="s-${key}"><i>${esc(v.label)}</i>　${esc(v.description)}</span>`;
  }
  lg.insertAdjacentHTML('afterbegin', html);
}

function renderHairChips(){
  const el = document.getElementById('hair-chips');
  el.innerHTML = D.nutrients.filter(n=>n.hairRelated)
    .map(n=>`<button onclick="goNutrient('${n.id}')">${esc(n.name)}</button>`).join('');
}

/* ---------- アコーディオン ---------- */
function toggleCard(id, forceOpen){
  const card = document.getElementById(id);
  if(!card) return;
  const body = card.querySelector('.card-body');
  const head = card.querySelector('.card-head');
  const isOpen = card.classList.contains('open');
  if(isOpen && !forceOpen){
    body.style.maxHeight = body.scrollHeight + 'px';
    requestAnimationFrame(()=>{ body.style.maxHeight = '0'; });
    card.classList.remove('open');
    head.setAttribute('aria-expanded','false');
  }else if(!isOpen){
    body.style.maxHeight = body.scrollHeight + 'px';
    card.classList.add('open');
    head.setAttribute('aria-expanded','true');
    setTimeout(()=>{ if(card.classList.contains('open')) body.style.maxHeight = 'none'; }, 450);
  }
}

/* ---------- 双方向リンク ---------- */
function goNutrient(id){ navigateTo('nutrients', 'n-'+id); }
function goProduct(id){ navigateTo('products', 'p-'+id); }

function navigateTo(tab, cardId){
  if(aboutVisible) toggleAbout();
  switchTab(tab);
  requestAnimationFrame(()=>{
    toggleCard(cardId, true);
    const card = document.getElementById(cardId);
    if(card){
      setTimeout(()=>{
        card.scrollIntoView({behavior:'smooth', block:'start'});
        card.classList.remove('flash');
        void card.offsetWidth;
        card.classList.add('flash');
      }, 80);
    }
  });
}

/* ---------- タブ切替 ---------- */
let currentTab = 'products';
function switchTab(tab){
  currentTab = tab;
  document.getElementById('view-products').classList.toggle('visible', tab==='products');
  document.getElementById('view-nutrients').classList.toggle('visible', tab==='nutrients');
  document.getElementById('tab-products').classList.toggle('active', tab==='products');
  document.getElementById('tab-nutrients').classList.toggle('active', tab==='nutrients');
  if(tab==='nutrients') animateBars();
}

/* ---------- 覚書 ---------- */
let aboutVisible = false;
function toggleAbout(){
  aboutVisible = !aboutVisible;
  document.getElementById('view-about').classList.toggle('visible', aboutVisible);
  document.getElementById('view-products').classList.toggle('hidden', aboutVisible);
  document.getElementById('view-nutrients').classList.toggle('hidden', aboutVisible);
  document.getElementById('hair-section').classList.toggle('hidden', aboutVisible);
  document.querySelector('nav').classList.toggle('hidden', aboutVisible);
  document.getElementById('about-toggle').textContent = aboutVisible? '野帳へ戻る' : '記録者の覚書';
  if(aboutVisible){
    window.scrollTo({top:0, behavior:'smooth'});
  }else{
    switchTab(currentTab);
  }
}

function renderAbout(){
  const a = D.aboutPage;
  const paras = a.body.split('\n\n').map(p=>`<p>${esc(p)}</p>`).join('');
  document.getElementById('about-body').innerHTML =
    `<h2>${esc(a.title)}</h2>${paras}<div class="about-sign">${esc(a.signature)}</div>
     <img class="watage" src="chinguruma_watage.png" alt="" aria-hidden="true">`;
}

/* ---------- 充足バーのアニメーション ---------- */
let barsAnimated = false;
function animateBars(){
  if(barsAnimated) return;
  barsAnimated = true;
  requestAnimationFrame(()=>{
    document.querySelectorAll('.bar-fill').forEach(b=>{
      b.style.width = b.dataset.pct + '%';
    });
  });
}

/* ---------- 初期化 ---------- */
renderProducts();
renderNutrients();
renderLegend();
renderHairChips();
renderAbout();
</script>
</body>
</html>
